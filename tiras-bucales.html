<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RAIAN | Tiras bucales</title>
  <meta name="description" content="Guía visual de uso de las tiras bucales RAIAN">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Segoe UI",Arial,sans-serif;
      background:linear-gradient(180deg,#faf7f2 0%,#f3ede4 100%);
      color:#1f1b18;
    }
    .page{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:18px 12px 26px;
    }
    .logo{
      margin-bottom:14px;
      font-weight:900;
      letter-spacing:.22em;
      font-size:1rem;
      text-transform:uppercase;
      color:#1f1b18;
    }
    .swiper{
      width:100%;
      max-width:430px;
      border-radius:24px;
      overflow:hidden;
      box-shadow:0 14px 34px rgba(31,27,24,.12);
      background:#fff;
    }
    .swiper-slide{
      aspect-ratio:9/16;
      background:#fff;
    }
    .swiper-slide img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .swiper-pagination{
      position:relative;
      margin-top:14px;
    }
    .swiper-pagination-bullet{
      background:#1f1b18;
      opacity:.25;
    }
    .swiper-pagination-bullet-active{
      opacity:1;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="logo">RAIAN</div>

    <div class="swiper">
      <div class="swiper-wrapper">
        <div class="swiper-slide">
          <img src="img/bucales-slide-1.jpg" alt="Tiras bucales RAIAN - portada">
        </div>
        <div class="swiper-slide">
          <img src="img/bucales-slide-2.jpg" alt="Tiras bucales RAIAN - presentación">
        </div>
        <div class="swiper-slide">
          <img src="img/bucales-slide-3.jpg" alt="Tiras bucales RAIAN - cómo usar">
        </div>
        <div class="swiper-slide">
          <img src="img/bucales-slide-4.jpg" alt="Tiras bucales RAIAN - pasos">
        </div>
        <div class="swiper-slide">
          <img src="img/bucales-slide-5.jpg" alt="Tiras bucales RAIAN - consejos">
        </div>
        <div class="swiper-slide">
          <img src="img/bucales-slide-6.jpg" alt="Tiras bucales RAIAN - cierre">
        </div>
      </div>
    </div>

    <div class="swiper-pagination"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
  <script>
    new Swiper('.swiper', {
      pagination: {
        el: '.swiper-pagination',
        clickable: true
      },
      spaceBetween: 0
    });
  </script>
</body>
</html>
